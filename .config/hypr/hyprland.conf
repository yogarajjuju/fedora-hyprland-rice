# --- HYPRLAND CONFIGURATION ---

# --- 1. THE DAEMON (MUST BE FIRST) ---
# We start the engine first, then wait 1 second before picking a random wall
exec-once = swww-daemon
exec-once = sleep 1 && ~/.config/hypr/random_wall.sh

# --- 2. AUTOSTART ---
exec-once = waybar
exec-once = swaync
exec-once = nm-applet --indicator

# --- 3. KEYBINDINGS ($mainMod = SUPER) ---
$mainMod = SUPER

# App Shortcuts
bind = $mainMod, Q, killactive,            # Close active window
bind = $mainMod, T, exec, kitty            # Terminal
bind = $mainMod, E, exec, dolphin          # File Manager
bind = $mainMod, V, exec, code             # VS Code
bind = $mainMod, B, exec, google-chrome    # Browser
bind = $mainMod, A, exec, rofi -show drun  # App Launcher

# System Shortcuts
bind = $mainMod, L, exec, hyprlock         # Lock screen
bind = $mainMod, P, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png
bind = $mainMod, slash, exec, cat ~/.config/hypr/cheatsheet.txt | rofi -dmenu -i -p "Shortcuts" -theme-str 'window {width: 600px;}'
bind = ALT, Control_R, exec, killall waybar; waybar & # Reload Waybar

# --- 4. THE FIXES (Wallpaper & Wi-Fi) ---
# Manual Wallpaper Cycle
bind = $mainMod ALT, W, exec, ~/.config/hypr/random_wall.sh

# Fixed Wi-Fi Shortcut (added missing space before #)
bind = $mainMod, W, exec, kitty --class floating_kitty -e nmtui

# --- 5. NAVIGATION & WORKSPACES ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- 6. SCREENSHOTS ---
# Works even on lockscreen
bindl = , Print, exec, grim ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png

# --- VOLUME CONTROL ---
# Increases volume by 5%
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# Decreases volume by 5%
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# Mutes volume
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- BRIGHTNESS CONTROL ---
# Increases brightness by 5%
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
# Decreases brightness by 5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
# --- 7. ANIMATIONS ---
animations {
    enabled = yes

    bezier = liquid_bounce, 0.34, 1.5, 0.64, 1
    bezier = smooth_out, 0.33, 0, 0.67, 0
    bezier = fluent_decel, 0.1, 1, 0, 1

    animation = windowsIn, 1, 5, liquid_bounce, popin 70%
    animation = windowsOut, 1, 3, smooth_out, popin 80%
    animation = windowsMove, 1, 4, fluent_decel, slide
    animation = workspaces, 1, 5, liquid_bounce, slide
    animation = fadeIn, 1, 4, fluent_decel
    animation = fadeOut, 1, 4, fluent_decel
}

