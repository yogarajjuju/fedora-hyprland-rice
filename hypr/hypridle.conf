general {
    lock_cmd = pidof hyprlock || hyprlock       # Avoid starting multiple instances of hyprlock
    before_sleep_cmd = loginctl lock-session    # Lock the screen before the system goes to sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn the screen back on when waking up
}

# --- 3-Minute AFK Lock ---
listener {
    timeout = 180                                 # 180 seconds = 3 minutes
    on-timeout = loginctl lock-session            # Action: Lock the screen
}

# --- 3.5-Minute Screen Off (Saves Battery) ---
listener {
    timeout = 210                                 # 210 seconds = 3.5 minutes
    on-timeout = hyprctl dispatch dpms off        # Action: Turn off the display
    on-resume = hyprctl dispatch dpms on          # Action: Turn display back on when you move the mouse
}
