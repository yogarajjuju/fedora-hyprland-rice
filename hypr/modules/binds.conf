# =========================
# KEYBINDS (CLEAN + FIXED)
# =========================

$mainMod = SUPER

# --- APPS ---
bind = $mainMod, Q, killactive
bind = $mainMod, T, exec, kitty
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, exec, code
bind = $mainMod, B, exec, google-chrome
bind = $mainMod, A, exec, rofi -show drun -theme ~/.config/rofi/style.rasi

# --- SYSTEM ---
bind = $mainMod, L, exec, hyprlock

# --- BRIGHTNESS (WORKING) ---
bindel = , XF86MonBrightnessUp, exec, brightnessctl -d amdgpu_bl1 set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl -d amdgpu_bl1 set 5%-

# --- AUDIO ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- SCREENSHOT ---
bind = $mainMod, P, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png
bindl = , Print, exec, grim ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png

# --- CHEATSHEET ---
bind = $mainMod, slash, exec, bash -c 'cat ~/.config/hypr/cheatsheet.txt | rofi -dmenu -i -p "Shortcuts"'

# --- WAYBAR RELOAD ---
bind = ALT, Control_R, exec, bash -c 'killall waybar; waybar &'

# --- LID LOCK ---
bindl = , switch:on:Lid Switch, exec, pidof hyprlock || hyprlock

# --- WIFI + WALLPAPER ---
bind = $mainMod, W, exec, kitty --class floating_kitty -e nmtui
bind = $mainMod ALT, W, exec, ~/.config/hypr/random_wall.sh

# --- NAVIGATION ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- WORKSPACES ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- WINDOW MANAGEMENT ---
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, SPACE, togglefloating

bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

bind = $mainMod, C, exec, ~/.config/hypr/cava_float.sh

# Move window
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Swap
bind = $mainMod CTRL, left, swapwindow, l
bind = $mainMod CTRL, right, swapwindow, r
bind = $mainMod CTRL, up, swapwindow, u
bind = $mainMod CTRL, down, swapwindow, d

# Resize
bind = $mainMod ALT, left, resizeactive, -50 0
bind = $mainMod ALT, right, resizeactive, 50 0
bind = $mainMod ALT, up, resizeactive, 0 -50
bind = $mainMod ALT, down, resizeactive, 0 50

# Layout
bind = $mainMod, Tab, layoutmsg, cycle
bind = $mainMod, S, layoutmsg, togglesplit
bind = $mainMod, M, layoutmsg, orientationleft
bind = $mainMod, D, layoutmsg, orientationtop

# Animation switch
bind = $mainMod SHIFT, F1, exec, cp ~/.config/hypr/animations_smooth.conf ~/.config/hypr/modules/animations.conf && hyprctl reload
bind = $mainMod SHIFT, F2, exec, cp ~/.config/hypr/animations_bounce.conf ~/.config/hypr/modules/animations.conf && hyprctl reload
